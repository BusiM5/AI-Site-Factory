services:
  - type: web
    name: ai-site-factory-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: ai-site-factory-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PIPELINE_DB_PATH
        value: /var/data/pipeline.db
      - key: CAMPAIGN_UPLOAD_DIR
        value: /var/data/uploads
      - key: ENABLE_ZENDESK_CONFIG_BOOTSTRAP
        value: "true"
      - key: ENABLE_PIPELINE_SEED_RESTORE
        value: "true"
      - key: ZENDESK_CAMPAIGN_RECOVERY_TICKET_IDS
        value: "5809,5810,5824,5825,5826,5827,5828,5829,5830,5831,5832,5833,5834,5835,5836,5837,5839,5840,5841,5842"
      - key: GITHUB_REPO_PRIVATE
        value: "false"
      - key: NETLIFY_DEPLOY_POLL_SECONDS
        value: "45"
