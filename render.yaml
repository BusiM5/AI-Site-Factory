services:
  - type: web
    name: ai-site-factory-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PIPELINE_DB_PATH
        value: /opt/render/project/src/backend/data/pipeline.db
      - key: GITHUB_REPO_PRIVATE
        value: "false"
      - key: NETLIFY_DEPLOY_POLL_SECONDS
        value: "45"
